name: test and build

on:
  push:
    branches: [ "main" ]
  
env:
  CARGO_TERM_COLOR: always

jobs:
  test-and-build:

    runs-on: ubuntu-latest

    steps:
    - name: checkout repo
      uses: actions/checkout@v3
    - name: Update local toolchain
      run: |
        rustup update
        rustup component add clippy
    - name: Toolchain info
      run: |
        cargo --version --verbose
      run: cargo test --verbose
